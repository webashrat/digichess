global
    log stdout format raw local0

defaults
    mode http
    timeout connect 5s
    timeout client 60s
    timeout server 60s
    option httplog

frontend http_front
    bind *:8080
    default_backend digichess_backends

backend digichess_backends
    balance roundrobin
    option httpchk GET /api/games/tournaments/
    http-check expect status 401
    server backend_a backend:8000 check
    server backend_b backend-2:8000 check
