name: Deploy Backend (VM)

on:
  push:
    branches:
      - main
    paths:
      - "digichess-backend/**"
      - ".github/workflows/deploy-backend-vm.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend-vm
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Validate deploy secrets
        run: |
          test -n "${{ secrets.VM_HOST }}" || (echo "Missing secret: VM_HOST" && exit 1)
          test -n "${{ secrets.VM_USER }}" || (echo "Missing secret: VM_USER" && exit 1)
          test -n "${{ secrets.VM_SSH_KEY }}" || (echo "Missing secret: VM_SSH_KEY" && exit 1)

      - name: Wait for CI/CD Pipeline success
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          echo "Waiting for CI/CD Pipeline on commit $SHA"
          for _ in $(seq 1 90); do
            status="$(gh api "repos/$REPO/actions/runs?event=push&head_sha=$SHA&per_page=100" --jq '.workflow_runs[] | select(.name=="CI/CD Pipeline") | .status' | head -n 1 || true)"
            conclusion="$(gh api "repos/$REPO/actions/runs?event=push&head_sha=$SHA&per_page=100" --jq '.workflow_runs[] | select(.name=="CI/CD Pipeline") | .conclusion' | head -n 1 || true)"
            run_url="$(gh api "repos/$REPO/actions/runs?event=push&head_sha=$SHA&per_page=100" --jq '.workflow_runs[] | select(.name=="CI/CD Pipeline") | .html_url' | head -n 1 || true)"

            if [ -z "$status" ]; then
              echo "CI run not found yet, retrying..."
            else
              echo "CI status=$status conclusion=${conclusion:-null}"
              echo "CI run: $run_url"
              if [ "$status" = "completed" ]; then
                if [ "$conclusion" = "success" ]; then
                  exit 0
                fi
                echo "CI did not pass (conclusion=$conclusion)."
                exit 1
              fi
            fi
            sleep 10
          done
          echo "Timed out waiting for CI/CD Pipeline completion."
          exit 1

      - name: Deploy backend on VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          passphrase: ${{ secrets.VM_SSH_PASSPHRASE }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euo pipefail

            APP_DIR="${{ secrets.VM_APP_DIR }}"
            if [ -z "$APP_DIR" ]; then
              APP_DIR="$HOME/digichess/digichess-backend"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build backend celery celery-beat
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend python manage.py migrate --noinput
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend python manage.py collectstatic --noinput
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml ps
