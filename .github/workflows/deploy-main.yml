name: Deploy Main (Frontend GCS)

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCS_BUCKET: ${{ secrets.GCS_BUCKET }}

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy-frontend:
    name: Build + Deploy Frontend (GCS)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set gcloud project
        run: gcloud config set project $PROJECT_ID

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: digichess-frontend/package-lock.json

      - name: Install dependencies
        working-directory: digichess-frontend
        run: npm ci

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_WS_BASE_URL: ${{ secrets.VITE_WS_BASE_URL }}
        working-directory: digichess-frontend
        run: npm run build

      - name: Sync to GCS bucket
        run: |
          gsutil -m rsync -R digichess-frontend/dist gs://$GCS_BUCKET
          gsutil web set -m index.html -e index.html gs://$GCS_BUCKET
          gsutil iam ch allUsers:objectViewer gs://$GCS_BUCKET
